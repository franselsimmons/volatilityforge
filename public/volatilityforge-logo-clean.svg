<linearGradient id="vfMetal" x1="0" y1="0" x2="820" y2="200" gradientUnits="userSpaceOnUse">
  <stop offset="0" stop-color="#FFFFFF"/>
  <stop offset="0.25" stop-color="#D5DCE5"/>
  <stop offset="0.5" stop-color="#F4F7FA"/>
  <stop offset="0.72" stop-color="#A6B2C0"/>
  <stop offset="1" stop-color="#EEF2F6"/>
</linearGradient>

<filter id="vfGlow" x="-40%" y="-60%" width="180%" height="220%">
  <feGaussianBlur stdDeviation="3" result="blur"/>
  <feMerge>
    <feMergeNode in="blur"/>
    <feMergeNode in="SourceGraphic"/>
  </feMerge>
</filter>

<filter id="vfShadow" x="-10%" y="-30%" width="120%" height="170%">
  <feDropShadow dx="0" dy="7" stdDeviation="7" flood-color="#020617" flood-opacity="0.34"/>
</filter>

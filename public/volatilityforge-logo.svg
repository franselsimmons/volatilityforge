// VolatilityForge logo — stalen schild met "V" en stijgende pijl.
// Pure SVG (schaalt scherp, transparante achtergrond, geen losse afbeelding
// nodig). Vlakke vullingen zonder gradient-id's, zodat het logo veilig
// meerdere keren op één pagina kan staan zonder conflicten.
//
// Wil je de pijl in ember (warm) in plaats van blauw? Vervang #4DA3FF door
// var(--ember) en #74E4BF door var(--ember-bright).

export default function Logo({ size = 34, showWordmark = true }) {
  const w = Math.round((size * 112) / 120);
  return (
    <span className="logo">
      <svg
        className="logo__mark"
        width={w}
        height={size}
        viewBox="0 0 112 120"
        role="img"
        aria-label="VolatilityForge"
      >
        {/* Schild — buitenrand (staal) */}
        <path
          d="M56 8 L98 22 V62 C98 88 79 107 56 114 C33 107 14 88 14 62 V22 Z"
          fill="#AEB8C5"
          stroke="#5B6675"
          strokeWidth="1.5"
          strokeLinejoin="round"
        />
        {/* Schild — lichte bovenrand voor een subtiele bevel */}
        <path
          d="M56 8 L98 22 V30 L56 17 L14 30 V22 Z"
          fill="#D7DEE7"
        />
        {/* Schild — donkere binnenkant */}
        <path
          d="M56 17 L90 28 V62 C90 84 74 100 56 106 C38 100 22 84 22 62 V28 Z"
          fill="#141A24"
        />
        {/* De "V" in helder staal */}
        <path
          d="M36 40 L54 84 L72 40"
          fill="none"
          stroke="#E6EBF1"
          strokeWidth="11"
          strokeLinecap="round"
          strokeLinejoin="round"
        />
        {/* De stijgende pijl (chart-zigzag) */}
        <path
          d="M44 76 L56 60 L64 66 L84 32"
          fill="none"
          stroke="#4DA3FF"
          strokeWidth="6"
          strokeLinecap="round"
          strokeLinejoin="round"
          style={{ filter: 'drop-shadow(0 0 2.5px rgba(77,163,255,0.55))' }}
        />
        {/* Pijlpunt */}
        <path
          d="M84 32 L74 33 M84 32 L83 43"
          fill="none"
          stroke="#4DA3FF"
          strokeWidth="6"
          strokeLinecap="round"
          strokeLinejoin="round"
        />
        {/* Vonk op de top */}
        <circle cx="84" cy="32" r="3.4" fill="#74E4BF" />
      </svg>
      {showWordmark && (
        <span className="logo__word">
          <span className="logo__word-a">Volatility</span>
          <span className="logo__word-b">Forge</span>
        </span>
      )}
    </span>
  );
}

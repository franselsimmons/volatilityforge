<svg width="1600" height="260" viewBox="0 0 1600 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="vfBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7DD3FC"/>
      <stop offset="50%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#74E4BF"/>
    </linearGradient>

    <linearGradient id="vfMetal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8FBFF"/>
      <stop offset="35%" stop-color="#C9D4E3"/>
      <stop offset="70%" stop-color="#8FA0B5"/>
      <stop offset="100%" stop-color="#E5EDF8"/>
    </linearGradient>

    <linearGradient id="vfDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1420"/>
      <stop offset="100%" stop-color="#07111D"/>
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Left icon -->
  <g transform="translate(18,18)">
    <rect x="0" y="0" width="220" height="220" rx="40" fill="url(#vfDark)" stroke="rgba(77,163,255,0.35)" stroke-width="3"/>
    <rect x="10" y="10" width="200" height="200" rx="32" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>

    <!-- V -->
    <path
      d="M46 48L82 48L112 165L142 48L178 48L130 191L94 191L46 48Z"
      fill="url(#vfMetal)"
    />

    <!-- F -->
    <path
      d="M122 58H182V86H149V112H178V139H149V191H122V58Z"
      fill="url(#vfMetal)"
      opacity="0.95"
    />

    <!-- rising chart line -->
    <path
      d="M42 158C66 154 84 139 99 120C114 101 131 88 151 72C163 62 177 52 193 42"
      stroke="url(#vfBlue)"
      stroke-width="10"
      stroke-linecap="round"
      stroke-linejoin="round"
      filter="url(#glow)"
    />
    <circle cx="193" cy="42" r="7" fill="#74E4BF"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(280,48)">
    <text
      x="0"
      y="74"
      fill="url(#vfMetal)"
      font-family="Inter, Arial, sans-serif"
      font-size="92"
      font-weight="800"
      letter-spacing="-3"
    >
      VolatilityForge
    </text>

    <text
      x="2"
      y="124"
      fill="#B8C6DA"
      font-family="Inter, Arial, sans-serif"
      font-size="26"
      font-weight="700"
      letter-spacing="7"
      opacity="0.95"
    >
      PRIVATE LONG &amp; SHORT CRYPTO SIGNALS
    </text>

    <line x1="2" y1="148" x2="860" y2="148" stroke="url(#vfBlue)" stroke-width="3" opacity="0.7"/>

    <!-- right line accent -->
    <path
      d="M940 130C988 95 1034 72 1084 52C1134 32 1177 18 1238 8"
      stroke="url(#vfBlue)"
      stroke-width="8"
      stroke-linecap="round"
      stroke-linejoin="round"
      filter="url(#glow)"
      opacity="0.95"
    />
    <circle cx="1238" cy="8" r="7" fill="#74E4BF"/>

    <!-- bottom pills -->
    <g transform="translate(2,168)">
      <rect x="0" y="0" width="170" height="34" rx="17" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.10)"/>
      <text x="85" y="22" text-anchor="middle" fill="#E9F1FF" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">
        Private Discord
      </text>

      <rect x="188" y="0" width="150" height="34" rx="17" fill="rgba(116,228,191,0.08)" stroke="rgba(116,228,191,0.20)"/>
      <text x="263" y="22" text-anchor="middle" fill="#E9F1FF" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">
        LONG + SHORT
      </text>

      <rect x="356" y="0" width="180" height="34" rx="17" fill="rgba(77,163,255,0.08)" stroke="rgba(77,163,255,0.20)"/>
      <text x="446" y="22" text-anchor="middle" fill="#E9F1FF" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">
        Risk-first signals
      </text>
    </g>
  </g>
</svg>
<svg width="1400" height="220" viewBox="0 0 1400 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>VolatilityForge</title>
  <desc>VolatilityForge transparent full-width header logo.</desc>

  <defs>
    <linearGradient id="vfBlue" x1="0" y1="30" x2="1390" y2="190" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7DD3FC"/>
      <stop offset="0.38" stop-color="#4DA3FF"/>
      <stop offset="0.68" stop-color="#176CFF"/>
      <stop offset="1" stop-color="#74E4BF"/>
    </linearGradient>

    <linearGradient id="vfMetal" x1="0" y1="0" x2="880" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.18" stop-color="#CBD5E1"/>
      <stop offset="0.34" stop-color="#F8FAFC"/>
      <stop offset="0.52" stop-color="#94A3B8"/>
      <stop offset="0.72" stop-color="#E2E8F0"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>

    <linearGradient id="vfSubtle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EAF6FF"/>
      <stop offset="1" stop-color="#A7C7EA"/>
    </linearGradient>

    <filter id="vfGlow" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="vfShadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#020617" flood-opacity="0.38"/>
    </filter>
  </defs>

  <rect width="1400" height="220" fill="transparent"/>

  <g filter="url(#vfShadow)">
    <g transform="translate(22 24)">
      <path d="M74 6L138 32V88C138 127 113 156 74 170C35 156 10 127 10 88V32L74 6Z" fill="rgba(255,255,255,0.035)" stroke="url(#vfBlue)" stroke-width="4"/>
      <path d="M32 42H60L75 124L101 42H129L91 146H58L32 42Z" fill="url(#vfMetal)"/>
      <path d="M100 42H156V68H128V88H152V113H128V146H100V42Z" fill="url(#vfMetal)"/>

      <path
        d="M25 128C49 117 67 98 86 79C109 56 130 43 164 28"
        stroke="url(#vfBlue)"
        stroke-width="9"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#vfGlow)"
      />
      <circle cx="164" cy="28" r="7" fill="#74E4BF"/>
    </g>

    <g transform="translate(230 48)">
      <text
        x="0"
        y="66"
        fill="url(#vfMetal)"
        font-family="Inter, Arial, Helvetica, sans-serif"
        font-size="76"
        font-weight="900"
        letter-spacing="-3.5"
      >
        VolatilityForge
      </text>

      <text
        x="4"
        y="113"
        fill="url(#vfSubtle)"
        font-family="Inter, Arial, Helvetica, sans-serif"
        font-size="20"
        font-weight="850"
        letter-spacing="6.4"
      >
        PRIVATE LONG &amp; SHORT CRYPTO SIGNALS
      </text>

      <path
        d="M4 139H735"
        stroke="url(#vfBlue)"
        stroke-width="3.5"
        stroke-linecap="round"
        opacity="0.78"
      />

      <path
        d="M795 120C849 85 898 66 951 48C1011 27 1077 16 1160 9"
        stroke="url(#vfBlue)"
        stroke-width="7"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#vfGlow)"
      />
      <circle cx="1160" cy="9" r="7" fill="#74E4BF"/>
    </g>
  </g>
</svg>